services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: lilink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lilink
      POSTGRES_USER: lilink
      POSTGRES_PASSWORD: lilink
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: ghcr.io/axllent/mailpit:v1.20
    container_name: lilink-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
