name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-quality:
    name: Root lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:4000/v1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Run shared package tests
        run: npm run test:shared

      # Prisma Client is not committed; ESLint type-aware rules need generated types.
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://lilink:lilink@127.0.0.1:5432/lilink?schema=public
        run: npm run db:generate

      - name: Run root lint
        run: npm run lint

      - name: Verify lint does not rewrite files
        run: git diff --exit-code

      - name: Run root build
        run: npm run build

  api-tests:
    name: API unit and e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "postgresql://lilink:lilink@127.0.0.1:5432/lilink?schema=public"
      JWT_SECRET: 1234567890abcdef
      ADMIN_JWT_SECRET: abcdef1234567890
      MERCHANT_JWT_SECRET: merchant1234567890abcdef
      ADMIN_COOKIE_NAME: lilink_admin_token
      SMTP_FROM: "LiLink <hello@lilink.zone>"
      CRON_SECRET: abcdef1234567890
      REDEEM_TICKET_SECRET: test-redeem-ticket-secret-0123456789
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: lilink
          POSTGRES_USER: lilink
          POSTGRES_PASSWORD: lilink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lilink -d lilink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply API migrations
        run: npm exec --workspace api prisma migrate deploy

      - name: Run API unit tests
        run: npm run test --workspace api

      - name: Run API e2e tests
        run: npm run test:e2e --workspace api
