<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>离线 · LiLink</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: #f4f1ea;
        color: #5d2330;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      .glyph {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        color: #fff7ee;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 0.02em;
        background: linear-gradient(135deg, #c8756a 0%, #8b3a4a 100%);
        box-shadow: 0 6px 18px rgba(139, 58, 74, 0.26);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 24px;
        color: #6b5b50;
        line-height: 1.6;
        font-size: 14px;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 12px 28px;
        border-radius: 999px;
        background: #8b3a4a;
        color: #fff7ee;
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glyph">Li</div>
      <h1>当前处于离线状态</h1>
      <p>无法连接到 LiLink。请检查你的网络后重试。</p>
      <button onclick="location.reload()">重试</button>
    </div>
  </body>
</html>
