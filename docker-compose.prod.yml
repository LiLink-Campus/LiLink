services:
  postgres:
    image: postgres:16-alpine
    container_name: lilink-postgres
    restart: always
    environment:
      POSTGRES_DB: lilink
      POSTGRES_USER: lilink
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lilink"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lilink-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      DATABASE_URL: postgresql://lilink:${DB_PASSWORD}@postgres:5432/lilink?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      COOKIE_NAME: lilink_token
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME}
      CRON_SECRET: ${CRON_SECRET}

  caddy:
    image: caddy:2-alpine
    container_name: lilink-caddy
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
